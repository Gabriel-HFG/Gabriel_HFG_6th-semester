<!DOCTYPE html>
<html lang="en">

<title>FSY Survey</title>

<img src="https://aaroncalahorra-computerlab.notion.site/image/attachment%3A1e4e3ffc-aecc-4524-aeb4-9df0fefe6cf5%3Aimage.png?table=block&id=3175b127-bb52-8047-b166-e0a4ec3ba135&spaceId=c4b8832f-7e93-4972-ba52-2bd9f7b273cf&width=1060&userId=&cache=v2">
<form>
    <label for="firstname">First name: </label>
    <input type="text" name="firstname"  required>
    <br>
    <label for="lastname">Last name: </label>
    <input type="text" name="lastname"  required>
    <br>
    <label for="email">email: </label>
    <input type="email" name="email"  required>
    <br>
    <label for="Country">Country: </label>
    <input type="text" name="Country"  required>
    <br>
    <label for="State">State if any: </label>
    <input type="text" name="State"  required>
    <br>
    <label for="Age">Age: </label>
    <input type="number" name="Age" min ="13" max = "25" required>
    <br>
    <label for="Bishop">Bishop: </label>
    <input type="text" name="Age"  required>
    <br>
    <label for="Assigment">Church Assigment if any: </label>
    <input type="text" name="Assigment"  required>
    <br>
    <label for="birthday">Birthdate: </label>
    <input type="date" name="Birthday"  required>
    <br>
    <label for="comida">Dietas y Alergias:: </label>
    <input type="text" name="comida"  required>
    <br>
    <label>Contacto Medico o padres: </label>
    <input type="text" required>
    <br>
    <label for="image">Upload and image </label>
    <input type="image" name="image"  required>
    <br>
    <label for="phone">Enter a phone number:</label>
    <input type="tel" id="phone" name="phone"
    placeholder="636-756-285"
    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">-
    <br>
    <input type="submit" value="Complete!">
    <br><br>
    <a href="https://www.churchofjesuschrist.org/youth/childrenandyouth/fsy/?lang=eng">More information</a>
</form>
</html>
